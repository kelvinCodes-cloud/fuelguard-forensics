<table><tr><th>ID</th><th>Plate</th><th>Driver</th><th>Offline</th><th>Fuel Drop</th><th>Severity</th><th>Status</th><th>Reports / Action</th></tr>{% for i in incidents %}<tr><td>#{{ i.id }}</td><td>{{ i.plate }}</td><td>{{ i.driver }}</td><td>{{ i.minutes_offline }} min</td><td>{{ i.fuel_drop }} L</td><td><span class="pill {{ i.severity }}">{{ i.severity }}</span></td><td><span class="pill {{ i.status }}">{{ i.status }}</span></td><td><a href="/reports/{{ i.id }}.csv">CSV</a> · <a href="/reports/{{ i.id }}.pdf">PDF</a>{% if i.status == 'open' %}<form class="inline-form" method="post" action="/incidents/{{ i.id }}/resolve"><button class="small-button" type="submit">Resolve mistaken alert</button></form>{% endif %}</td></tr>{% else %}<tr><td colspan="8">No incidents detected.</td></tr>{% endfor %}</table>
