<table><tr><th>ID</th><th>Plate</th><th>Driver</th><th>Offline</th><th>Fuel Drop</th><th>Severity</th><th>Reports</th></tr>{% for i in incidents %}<tr><td>#{{ i.id }}</td><td>{{ i.plate }}</td><td>{{ i.driver }}</td><td>{{ i.minutes_offline }} min</td><td>{{ i.fuel_drop }} L</td><td><span class="pill {{ i.severity }}">{{ i.severity }}</span></td><td><a href="/reports/{{ i.id }}.csv">CSV</a> · <a href="/reports/{{ i.id }}.pdf">PDF</a></td></tr>{% else %}<tr><td colspan="7">No incidents detected.</td></tr>{% endfor %}</table>
