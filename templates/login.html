{% extends 'base.html' %}{% block content %}
<section class="login-card">
  <div class="login-copy">
    <small>Secure Fleet Access</small>
    <h1>Login to FuelGuard</h1>
    <p>Access the fleet dashboard, jamming alerts, and forensic reports.</p>
  </div>
  <form method="post" class="login-form">
    {% with messages = get_flashed_messages() %}{% if messages %}<div class="error">{{ messages[0] }}</div>{% endif %}{% endwith %}
    <label>Username</label>
    <input name="username" type="text" autocomplete="username" required autofocus>
    <label>Password</label>
    <input name="password" type="password" autocomplete="current-password" required>
    <button type="submit">Login</button>
    <p class="demo-hint">Demo: <strong>admin</strong> / <strong>admin123</strong></p>
  </form>
</section>
{% endblock %}
